{% extends 'base.html' %}

{% block content %}
    <a href='/sermons' style='color: #B8A9D9; text-decoration: none; font-family: Inter, sans-serif;
        font-size: 14px;'>← Back to Sermons</a>

    <div style='margin-top: 20px;'>
        <div style='background: linear-gradient(rgba(25, 15, 40, 0.70), rgba(35, 65, 45, 0.72)), url("https://images.unsplash.com/photo-1695489790272-8f108558e69c?auto=format&fit=crop&w=800&q=80") center/cover no-repeat;
            border-radius: 12px; padding: 25px; margin-bottom: 20px;'>
            <p style='color: #B8A9D9; font-size: 11px; letter-spacing: 2px;
                text-transform: uppercase; font-family: Inter, sans-serif; margin-bottom: 8px;'>
                Fellowship With The Word · {{ sermon.date }}
            </p>
            <h1 style='color: white; font-family: Lora, Georgia, serif;
                font-size: 24px; margin-bottom: 15px; line-height: 1.4; border: none; padding: 0;'>
                {{ sermon.title }}
            </h1>

            {% if current_user %}
                <form method='POST' action='/favourite/sermon/{{ sermon.id }}'>
                    <button type='submit'
                        style='background: {% if favourited %}#9B8EC4{% else %}transparent{% endif %};
                        color: {% if favourited %}#0F0F14{% else %}#9B8EC4{% endif %};
                        border: 1px solid #9B8EC4; padding: 6px 16px; border-radius: 20px;
                        font-size: 13px; cursor: pointer; font-family: Inter, sans-serif; font-weight: 600;'>
                        {% if favourited %}★ Saved{% else %}☆ Save{% endif %}
                    </button>
                </form>
            {% else %}
                <a href='/login' style='color: #9B8EC4; font-size: 13px;'>Log in to save this sermon</a>
            {% endif %}
        </div>

        <div style='border-radius: 12px; overflow: hidden; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);'>
            <iframe width='100%' height='250'
                src='{{ sermon.video_url }}'
                frameborder='0'
                allowfullscreen
                style='display: block;'>
            </iframe>
        </div>

        <div class='devotional-card'>
            <p style='white-space: pre-wrap; line-height: 1.9; font-size: 16px;
                font-family: Inter, sans-serif; color: #333;'>{{ sermon.description }}</p>
        </div>

        <div style='margin-top: 20px; text-align: center;'>
            <a href='/sermons'
                style='color: #9B8EC4; font-weight: bold; text-decoration: none;
                font-family: Inter, sans-serif; font-size: 14px;
                border: 2px solid #9B8EC4; padding: 10px 25px; border-radius: 25px;'>
                ← Back to all sermons
            </a>
        </div>
    </div>
{% endblock %}
