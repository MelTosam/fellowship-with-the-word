{% extends 'base.html' %}

{% block content %}
    <a href='/bible' style='color: #C9A84C; text-decoration: none;
        font-family: Inter, sans-serif; font-size: 14px;'>Back to Bible</a>

    <div style='background: linear-gradient(135deg, #0A1628 0%, #1A3A5C 100%);
        border-radius: 12px; padding: 20px; margin: 15px 0 20px 0;'>
        <p style='color: #C9A84C; font-size: 11px; letter-spacing: 2px;
            text-transform: uppercase; font-family: Inter, sans-serif; margin-bottom: 6px;'>
            Search Results
        </p>
        <h2 style='color: white; font-family: Lora, Georgia, serif;
            font-size: 20px; margin: 0;'>{{ reference }}</h2>
    </div>

    <div class='devotional-card' style='margin-bottom: 20px;'>
        <form method='GET' action='/bible/search'>
            <input type='text' name='reference' value='{{ reference }}'
                style='width: 75%; padding: 10px; border: 2px solid #9B8EC4;
                border-radius: 4px; font-size: 15px; font-family: Inter, sans-serif;'>
            <button type='submit'
                style='background-color: #9B8EC4; color: white; padding: 10px 18px;
                border: none; border-radius: 4px; font-size: 15px; cursor: pointer; margin-left: 5px;'>
                Search
            </button>
        </form>
    </div>

    {% if verses %}
        <div style='background: linear-gradient(135deg, #0A1628 0%, #1A3A5C 100%);
            border-radius: 12px; padding: 25px; margin-bottom: 20px;'>
            <p style='color: #C9A84C; font-size: 12px; font-weight: 600;
                font-family: Inter, sans-serif; margin-bottom: 15px;'>
                {{ verse_reference }}
            </p>
            {% for verse in verses %}
                <div style='display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start;'>
                    <span style='color: #C9A84C; font-family: Inter, sans-serif;
                        font-size: 11px; font-weight: 700; min-width: 20px;
                        margin-top: 3px;'>{{ verse.verse }}</span>
                    <p style='color: white; font-family: Lora, Georgia, serif;
                        font-size: 16px; line-height: 1.8; margin: 0;'>{{ verse.text }}</p>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% if error %}
        <div style='background: #3D1515; border-radius: 8px; padding: 15px; margin-top: 15px;'>
            <p style='color: #F5C4A0; font-family: Inter, sans-serif; margin: 0;'>{{ error }}</p>
        </div>
    {% endif %}

{% endblock %}
