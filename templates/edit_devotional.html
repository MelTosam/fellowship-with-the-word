{% extends 'base.html' %}

{% block content %}
    <h1>Edit Devotional</h1>

    {% if message %}
        <div style='background: #1A3A1A; border-radius: 8px; padding: 15px; margin-bottom: 20px;'>
            <p style='color: #90EE90; font-family: Inter, sans-serif; margin: 0;'>{{ message }}</p>
        </div>
    {% endif %}

    <div class='devotional-card'>
        <form method='POST'>
            <p style='font-weight: 600; margin-bottom: 6px; color: #F0EDE8;'>Title</p>
            <input type='text' name='title' value='{{ devotional.title }}'
                style='width: 100%; padding: 10px; margin-bottom: 15px;
                border: 1px solid rgba(201, 168, 76, 0.4); border-radius: 4px;
                font-size: 15px; background: #1A1A24; color: #F0EDE8;'>

            <p style='font-weight: 600; margin-bottom: 6px; color: #F0EDE8;'>Verse</p>
            <input type='text' name='verse' value='{{ devotional.verse }}'
                style='width: 100%; padding: 10px; margin-bottom: 15px;
                border: 1px solid rgba(201, 168, 76, 0.4); border-radius: 4px;
                font-size: 15px; background: #1A1A24; color: #F0EDE8;'>

            <p style='font-weight: 600; margin-bottom: 6px; color: #F0EDE8;'>Explanation</p>
            <textarea name='explanation' rows='12'
                style='width: 100%; padding: 10px; margin-bottom: 15px;
                border: 1px solid rgba(201, 168, 76, 0.4); border-radius: 4px;
                font-size: 15px; background: #1A1A24; color: #F0EDE8;
                font-family: Inter, sans-serif; line-height: 1.8;'>{{ devotional.explanation }}</textarea>

            <p style='font-weight: 600; margin-bottom: 6px; color: #F0EDE8;'>Date (DD-MM-YYYY)</p>
            <input type='text' name='date' value='{{ devotional.date }}'
                style='width: 100%; padding: 10px; margin-bottom: 15px;
                border: 1px solid rgba(201, 168, 76, 0.4); border-radius: 4px;
                font-size: 15px; background: #1A1A24; color: #F0EDE8;'>

            <button type='submit'
                style='background-color: #C9A84C; color: #0F0F14; padding: 12px 30px;
                border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: 700;'>
                Save Changes
            </button>
        </form>

        <form method='POST' action='/delete-devotional/{{ devotional.id }}'
            onsubmit='return confirm("Are you sure you want to delete this devotional? This cannot be undone.");'
            style='margin-top: 20px;'>
            <button type='submit'
                style='background-color: #8B0000; color: white; padding: 10px 25px;
                border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600;'>
                Delete Devotional
            </button>
        </form>

        <div style='margin-top: 15px;'>
            <a href='/add-devotional' style='color: #9B8EC4; font-size: 14px;'>← Back to devotionals list</a>
        </div>
    </div>
{% endblock %}
