{% extends 'base.html' %}

{% block content %}
    <h1>Sermons</h1>
    <p>Browse our Bible study sessions below.</p>

    {% for sermon in sermons %}
        <div class='devotional-card'>
            <h2>{{ sermon.title }}</h2>
            <p class='verse'>{{ sermon.date }}</p>
            <p>{{ sermon.description }}</p>
            <div style='margin-top: 15px;'>
                <iframe width='100%' height='315'
                    src='{{ sermon.video_url }}'
                    frameborder='0'
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    {% endfor %}
{% endblock %}
