<!DOCTYPE html>
<html>
<head>
    <title>Fellowship With The Word</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='theme-color' content='#9B8EC4'>
    <link rel='manifest' href='/static/manifest.json'>
    <link rel='stylesheet' href='/static/css/style.css'>
</head>
<body>
    <nav>
        <button class='hamburger' onclick='toggleMenu()'>&#9776;</button>
        <div class='nav-center'>
            <a href='/' class='nav-brand'>
                <img src='/static/logo-nav.png' alt='FWTW Logo'
                    style='width: 32px; height: 32px; margin-right: 8px; vertical-align: middle;'>
                Fellowship With The Word
            </a>
            <div class='nav-tagline'>Networking the world with the light of life</div>
        </div>
        <div class='nav-links'>
            <a href='/'>Home</a>
            <a href='/devotionals'>Devotionals</a>
            <a href='/sermons'>Sermons</a>
            <a href='/bible'>Bible</a>
            <a href='/about'>About</a>
            <a href='/contact'>Contact</a>
            <a href='/give'>Give</a>
            <a href='/profile'>Profile</a>
        </div>
    </nav>

    <div class='mobile-menu' id='mobileMenu'>
        <a href='/about'>About Us</a>
        <a href='/contact'>Contact</a>
        <a href='/give'>Give</a>
        <a href='/privacy'>Privacy Policy</a>
    </div>

    <div class='container'>
        {% block content %}
        {% endblock %}
    </div>

    <nav class='bottom-nav'>
        <a href='/' class='bottom-nav-item'>
            <svg class='bottom-nav-icon' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                <path d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/>
            </svg>
            <span class='bottom-nav-label'>Home</span>
        </a>
        <a href='/devotionals' class='bottom-nav-item'>
            <svg class='bottom-nav-icon' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                <path d='M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 14H8v-2h8v2zm0-4H8v-2h8v2zm0-4H8V6h8v2z'/>
            </svg>
            <span class='bottom-nav-label'>Devotionals</span>
        </a>
        <a href='/sermons' class='bottom-nav-item'>
            <svg class='bottom-nav-icon' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                <path d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/>
            </svg>
            <span class='bottom-nav-label'>Sermons</span>
        </a>
        <a href='/bible' class='bottom-nav-item'>
            <svg class='bottom-nav-icon' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                <path d='M19 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h13c1.1 0 2-.9 2-2V4c0-1.1-.9-02-2-2zm-7 14l-4-4 1.41-1.41L12 13.17l6.59-6.59L20 8l-8 8z'/>
            </svg>
            <span class='bottom-nav-label'>Bible</span>
        </a>
        <a href='/profile' class='bottom-nav-item'>
            <svg class='bottom-nav-icon' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                <path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/>
            </svg>
            <span class='bottom-nav-label'>Profile</span>
        </a>
    </nav>

    <footer>
        <p>Fellowship With The Word &copy; 2026</p>
        <p style='margin-top: 8px;'><a href='/privacy' style='color: #C8DBC9; font-size: 12px;'>Privacy Policy</a></p>
    </footer>

    <script>
        function toggleMenu() {
            var menu = document.getElementById('mobileMenu');
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'block';
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/static/sw.js');
            });
        }
    </script>
</body>
</html>
