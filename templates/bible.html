{% extends 'base.html' %}

{% block content %}
    <h1>Bible</h1>
    <p>Search for any Bible verse by entering a reference below.</p>

    <div class='devotional-card'>
        <h2>Search a Verse</h2>
        <form method='POST'>
            <input type='text' name='reference' placeholder='e.g. John 3:16 or Romans 8:1-5'
                style='width: 100%; padding: 10px; margin-bottom: 15px;
                border: 2px solid #9B8EC4; border-radius: 4px; font-size: 16px;'>
            <button type='submit'
                style='background-color: #9B8EC4; color: white; padding: 10px 25px;
                border: none; border-radius: 4px; font-size: 16px; cursor: pointer;'>
                Search
            </button>
        </form>
    </div>

    {% if error %}
        <div class='devotional-card'>
            <p style='color: red;'>{{ error }}</p>
        </div>
    {% endif %}

    {% if verse_text %}
        <div class='devotional-card'>
            <h2>{{ verse_reference }}</h2>
            <p class='verse'>{{ verse_text }}</p>
        </div>
    {% endif %}
{% endblock %}
