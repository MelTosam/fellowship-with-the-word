{% extends 'base.html' %}

{% block content %}
    <a href='/devotionals' style='color: #C9A84C; text-decoration: none; font-family: Inter, sans-serif;
        font-size: 14px;'>← Back to Devotionals</a>

    <div style='margin-top: 20px;'>
        <div style='background: linear-gradient(rgba(15, 8, 2, 0.70), rgba(20, 10, 3, 0.72)), url("https://images.unsplash.com/photo-1524492514790-8310bf594ea4?auto=format&fit=crop&w=800&q=80") center/cover no-repeat;
            border-radius: 12px; padding: 25px; margin-bottom: 20px;'>
            <p style='color: #C9A84C; font-size: 11px; letter-spacing: 2px;
                text-transform: uppercase; font-family: Inter, sans-serif; margin-bottom: 8px;'>
                Fellowship With The Word · {{ devotional.date }}
            </p>
            <h1 style='color: white; font-family: Lora, Georgia, serif;
                font-size: 24px; margin-bottom: 12px; line-height: 1.4; border: none; padding: 0;'>
                {{ devotional.title }}
            </h1>
            <p style='color: #E8D5B0; font-style: italic; font-family: Lora, Georgia, serif;
                font-size: 16px; margin-bottom: 0;'>{{ devotional.verse }}</p>
        </div>

        <div style='background: linear-gradient(rgba(245, 235, 215, 0.55), rgba(240, 228, 205, 0.55)), url("https://images.unsplash.com/photo-1524492514790-8310bf594ea4?auto=format&fit=crop&w=800&q=80") center/cover no-repeat;
            border-radius: 12px; padding: 25px; margin-bottom: 20px;'>
            <p style='white-space: pre-wrap; line-height: 2; font-size: 16px;
                font-family: Lora, Georgia, serif; color: #1A0800;
                text-shadow: 0 1px 3px rgba(245, 235, 215, 0.8);'>{{ devotional.explanation }}</p>
        </div>

        <div style='text-align: center; margin-top: 20px;'>
            <a href='/devotionals'
                style='color: #C9A84C; font-weight: bold; text-decoration: none;
                font-family: Inter, sans-serif; font-size: 14px;
                border: 1px solid #C9A84C; padding: 10px 25px; border-radius: 25px;'>
                ← Back to all devotionals
            </a>
        </div>
    </div>
{% endblock %}
