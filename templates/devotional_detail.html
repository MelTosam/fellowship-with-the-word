{% extends 'base.html' %}

{% block content %}
    <a href='/devotionals' style='color: #F5C4A0; text-decoration: none; font-family: Inter, sans-serif;
        font-size: 14px;'>Back to Devotionals</a>

    <div style='margin-top: 20px;'>
        <div style='background: linear-gradient(rgba(80, 45, 0, 0.70), rgba(90, 55, 0, 0.75)), url("https://images.unsplash.com/photo-1536063766742-b514ee70707f?auto=format&fit=crop&w=800&q=80") center/cover no-repeat;
            border-radius: 12px; padding: 25px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(123, 74, 0, 0.4);'>
            <p style='color: #FFE0A0; font-size: 11px; letter-spacing: 2px;
                text-transform: uppercase; font-family: Inter, sans-serif; margin-bottom: 8px;'>
                Fellowship With The Word · {{ devotional.date }}
            </p>
            <h1 style='color: white; font-family: Lora, Georgia, serif;
                font-size: 24px; margin-bottom: 12px; line-height: 1.4; border: none; padding: 0;'>
                {{ devotional.title }}
            </h1>
            <p style='color: #FFE0A0; font-style: italic; font-family: Lora, Georgia, serif;
                font-size: 16px; margin-bottom: 0;'>{{ devotional.verse }}</p>
        </div>

        <div class='devotional-card'>
            <p style='white-space: pre-wrap; line-height: 1.9; font-size: 16px;
                font-family: Inter, sans-serif; color: #333;'>{{ devotional.explanation }}</p>
        </div>

        <div style='margin-top: 20px; text-align: center;'>
            <a href='/devotionals'
                style='color: #9B8EC4; font-weight: bold; text-decoration: none;
                font-family: Inter, sans-serif; font-size: 14px;
                border: 2px solid #9B8EC4; padding: 10px 25px; border-radius: 25px;'>
                Back to all devotionals
            </a>
        </div>
    </div>
{% endblock %}
